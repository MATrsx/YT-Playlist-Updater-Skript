name: YouTube to PCloud Sync

on:
  schedule:
    - cron: '0 6-22 * * *'  # Tagsüber: 7-23 Uhr MEZ (UTC+1) / 8-24 Uhr MESZ (UTC+2)
  workflow_dispatch:  # Manuelles Starten ermöglichen

permissions:
  contents: write  # Erlaubt Git Push

jobs:
  sync-videos:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Node.js (für yt-dlp JS-Challenge-Lösung)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # NEU: Python-Abhängigkeiten cachen → spart ~40-60s pro Run
    - name: Cache Python Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: pip-
    
    # Primär: Versuche aus Cache zu laden (schnell)
    - name: Restore Cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: downloaded_videos.txt
        key: downloaded-videos-${{ github.run_id }}
        restore-keys: |
          downloaded-videos-
    
    # Fallback: Falls Cache leer, aus Git laden
    - name: Use Git Version as Fallback
      if: steps.cache-restore.outputs.cache-hit != 'true'
      run: |
        if [ -f downloaded_videos.txt ]; then
          echo "✅ Verwende downloaded_videos.txt aus Git"
        else
          echo "ℹ️  Keine Historie gefunden - starte frisch"
          touch downloaded_videos.txt
        fi
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "yt-dlp[default]" requests mutagen

    - name: Verify Dependencies
      run: |
        echo "🔍 Versionen:"
        ffmpeg -version | head -1
        node --version
        python --version
        yt-dlp --version
    
    - name: Create Download Directory
      run: mkdir -p downloads
    
    - name: Show Current Status
      run: |
        if [ -f downloaded_videos.txt ]; then
          TOTAL=$(wc -l < downloaded_videos.txt)
          echo "📊 Aktuell getrackte Videos: $TOTAL"
        else
          echo "📊 Keine Videos getrackt"
        fi

    # NEU: Frühzeitig abbrechen wenn nichts zu tun → spart den kompletten Rest des Runs
    - name: Check for new videos
      id: check_new
      env:
        YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
      run: |
        NEW_COUNT=$(python - <<'EOF'
        import os, yt_dlp

        playlist_id = os.getenv('YOUTUBE_PLAYLIST_ID', '').strip()
        cookies_file = 'cookies.txt'

        if os.getenv('YOUTUBE_COOKIES', '').strip():
            with open(cookies_file, 'w') as f:
                f.write(os.getenv('YOUTUBE_COOKIES'))

        downloaded = set()
        if os.path.exists('downloaded_videos.txt'):
            with open('downloaded_videos.txt') as f:
                downloaded = set(line.strip() for line in f if line.strip())

        opts = {
            'quiet': True,
            'extract_flat': True,
            'ignoreerrors': True,
        }
        if os.path.exists(cookies_file):
            opts['cookiefile'] = cookies_file

        url = f'https://www.youtube.com/playlist?list={playlist_id}'
        with yt_dlp.YoutubeDL(opts) as ydl:
            info = ydl.extract_info(url, download=False)
            entries = info.get('entries', []) if info else []
            new = [e for e in entries if e and e.get('id') and e['id'] not in downloaded]
            print(len(new))
        EOF
        )
        echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
        echo "🔎 Neue Videos gefunden: $NEW_COUNT"

    - name: Run Sync Script
      if: steps.check_new.outputs.new_count != '0'  # Überspringen wenn nichts neu
      env:
        YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        PCLOUD_USERNAME: ${{ secrets.PCLOUD_USERNAME }}
        PCLOUD_PASSWORD: ${{ secrets.PCLOUD_PASSWORD }}
        PCLOUD_FOLDER: ${{ secrets.PCLOUD_FOLDER }}
        PCLOUD_REGION: ${{ secrets.PCLOUD_REGION }}
      run: python sync_script.py
    
    # Speichere in Cache (immer, auch bei Fehler im Script)
    - name: Save to Cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: downloaded_videos.txt
        key: downloaded-videos-${{ github.run_id }}
    
    # Commit zu Git nur bei Änderungen (Backup + Transparenz)
    - name: Commit to Git (Backup)
      if: success()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -f downloaded_videos.txt ]; then
          git add downloaded_videos.txt
          
          if git diff --staged --quiet; then
            echo "ℹ️  Keine Änderungen - kein Commit nötig"
          else
            TOTAL=$(wc -l < downloaded_videos.txt)
            git commit -m "📝 Update: $TOTAL Videos getrackt [$(date +'%Y-%m-%d %H:%M')]"
            git push
            echo "✅ Backup zu Git gepusht"
          fi
        fi
    
    - name: Final Statistics
      if: always()
      run: |
        echo "═══════════════════════════════════════"
        echo "📊 SYNC ZUSAMMENFASSUNG"
        echo "═══════════════════════════════════════"
        if [ -f downloaded_videos.txt ]; then
          TOTAL=$(wc -l < downloaded_videos.txt)
          echo "Gesamt getrackte Videos: $TOTAL"
        else
          echo "Keine Videos getrackt"
        fi
        echo "Neue Videos geprüft: ${{ steps.check_new.outputs.new_count }}"
        echo "Cache Status: ${{ steps.cache-restore.outputs.cache-hit == 'true' && '✅ Aus Cache geladen' || '🔄 Neu erstellt' }}"
        echo "═══════════════════════════════════════"
