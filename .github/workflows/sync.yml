name: YouTube to PCloud Sync

on:
  schedule:
    - cron: '0 * * * *'  # Jede Stunde
  workflow_dispatch:  # Manuelles Starten ermöglichen

jobs:
  sync-videos:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp requests
    
    - name: Create Download Directory
      run: mkdir -p downloads
    
    - name: Run Sync Script
      env:
        YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        PCLOUD_USERNAME: ${{ secrets.PCLOUD_USERNAME }}
        PCLOUD_PASSWORD: ${{ secrets.PCLOUD_PASSWORD }}
        PCLOUD_FOLDER: ${{ secrets.PCLOUD_FOLDER }}
      run: python sync_script.py
    
    - name: Commit Downloaded Video IDs
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add downloaded_videos.txt || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Update downloaded videos list"
        git push || true